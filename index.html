<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PyC console</title>
    <link rel="stylesheet" href="file.css">
</head>
<body>

<div id="container">
    <div id="editor">
        <h2>PyC Code</h2>
        <textarea id="codeBox">say('Hello from PyC')</textarea>
        <button onclick="runPyCFromEditor()">Run</button>
    </div>

    <div id="console">
        <h2>PyC Console</h2>
        <div id="output"></div>

        <div id="inputArea">
            <span>&gt;</span>
            <input id="consoleInput" autocomplete="off">
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
