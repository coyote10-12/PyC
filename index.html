<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="calculator">
            <h1>Advanced Calculator</h1>
            <input type="text" id="display" class="display" readonly placeholder="0">
            <div class="buttons">
                <button class="btn function-btn" onclick="appendFunction('sin(')">sin</button>
                <button class="btn function-btn" onclick="appendFunction('cos(')">cos</button>
                <button class="btn function-btn" onclick="appendFunction('tan(')">tan</button>
                <button class="btn operator-btn" onclick="appendOperator('√')">√</button>
                
                <button class="btn" onclick="appendValue('7')">7</button>
                <button class="btn" onclick="appendValue('8')">8</button>
                <button class="btn" onclick="appendValue('9')">9</button>
                <button class="btn operator-btn" onclick="appendOperator('/')">/</button>
                
                <button class="btn" onclick="appendValue('4')">4</button>
                <button class="btn" onclick="appendValue('5')">5</button>
                <button class="btn" onclick="appendValue('6')">6</button>
                <button class="btn operator-btn" onclick="appendOperator('*')">*</button>
                
                <button class="btn" onclick="appendValue('1')">1</button>
                <button class="btn" onclick="appendValue('2')">2</button>
                <button class="btn" onclick="appendValue('3')">3</button>
                <button class="btn operator-btn" onclick="appendOperator('-')">-</button>
                
                <button class="btn" onclick="appendValue('0')">0</button>
                <button class="btn" onclick="appendValue('.')">.</button>
                <button class="btn operator-btn" onclick="appendOperator('+')">+</button>
                <button class="btn operator-btn" onclick="appendOperator('^')">^</button>
                
                <button class="btn paren-btn" onclick="appendValue('(')">(</button>
                <button class="btn paren-btn" onclick="appendValue(')')">)</button>
                <button class="btn equals-btn" onclick="calculate()">=</button>
                <button class="btn clear-btn" onclick="clearDisplay()">C</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
