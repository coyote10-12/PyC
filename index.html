<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PyC Console</title>
    <link rel="stylesheet" href="file.css">
</head>
<body>

<div id="container">

    <!-- Editor Panel -->
    <section id="editor">
        <h2>PyC Code</h2>
        <textarea id="codeBox">say('Hello from PyC')</textarea>
        <button id="runBtn">Run</button>
    </section>

    <!-- Console Panel -->
    <section id="console">
        <h2>PyC Console</h2>

        <div id="output"></div>

        <div id="inputArea">
            <span>&gt;</span>
            <input id="consoleInput" autocomplete="off">
        </div>
    </section>

</div>

<script src="script.js"></script>
</body>
</html>
